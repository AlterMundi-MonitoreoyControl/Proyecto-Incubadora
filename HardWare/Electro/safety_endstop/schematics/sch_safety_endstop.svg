ntral" fill="black" font-size="11" font-family="sans" text-anchor="end"><tspan x="167.39999999999998" dy="11">EN_A</tspan></text><text x="90.0" y="-184.2" dominant-baseline="central" fill="black" font-size="10" font-family="sans" text-anchor="middle"><tspan x="90.0" dy="10">Motor_A / J9</tspan><tspan x="90.0" dy="10">(placa Olivia)</tspan></text><text x="183.6" y="-318.40000000000003" dominant-baseline="central" fill="#6b7280" font-size="7" font-family="sans" text-anchor="end"><tspan x="183.6" dy="7">pin2 · GPIO2</tspan></text><text x="183.6" y="-195.99999999999997" dominant-baseline="central" fill="#6b7280" font-size="7" font-family="sans" text-anchor="end"><tspan x="183.6" dy="7">pin3 · GPIO15</tspan></text><text x="183.6" y="-73.6" dominant-baseline="central" fill="#6b7280" font-size="7" font-family="sans" text-anchor="end"><tspan x="183.6" dy="7">pin4 · EN_A</tspan></text><text x="610.1999999999999" y="-299.0" dominant-baseline="central" fill="black" font-size="11" font-family="sans" text-anchor="start"><tspan x="610.1999999999999" dy="11">IN1</tspan></text><text x="610.1999999999999" y="-176.6" dominant-baseline="central" fill="black" font-size="11" font-family="sans" text-anchor="start"><tspan x="610.1999999999999" dy="11">IN2</tspan></text><text x="610.1999999999999" y="-54.199999999999974" dominant-baseline="central" fill="black" font-size="11" font-family="sans" text-anchor="start"><tspan x="610.1999999999999" dy="11">EN</tspan></text><text x="714.6" y="-237.79999999999995" dominant-baseline="central" fill="black" font-size="11" font-family="sans" text-anchor="end"><tspan x="714.6" dy="11">OUT1</tspan></text><text x="714.6" y="-115.39999999999998" dominant-baseline="central" fill="black" font-size="11" font-family="sans" text-anchor="end"><tspan x="714.6" dy="11">OUT2</tspan></text><text x="666.0" y="-184.2" dominant-baseline="central" fill="black" font-size="10" font-family="sans" text-anchor="middle"><tspan x="666.0" dy="10">Puente H</tspan><tspan x="666.0" dy="10">(modulo)</tspan></text><text x="241.2" y="-299.59999999999997" dominant-baseline="ideographic" fill="#92400e" font-size="8" font-family="sans" text-anchor="middle"><tspan x="241.2" dy="8">IN_A_N  subir</tspan></text><circle cx="312.12" cy="-288" r="4.32" style="stroke:#b91c1c;fill:white;stroke-width:1.6;stroke-dasharray:-;" /><circle cx="339.48" cy="-288" r="4.32" style="stroke:#b91c1c;fill:white;stroke-width:1.6;stroke-dasharray:-;" /><text x="325.79999999999995" y="-305.71999999999997" dominant-baseline="ideographic" fill="#b91c1c" font-size="8" font-family="sans" text-anchor="middle"><tspan x="325.79999999999995" dy="8">FC-SUP (NC)</tspan></text><text x="360.0" y="-299.59999999999997" dominant-baseline="ideographic" fill="black" font-size="8" font-family="sans" text-anchor="middle"><tspan x="360.0" dy="8">10k</tspan></text><text x="241.2" y="-177.2" dominant-baseline="ideographic" fill="#92400e" font-size="8" font-family="sans" text-anchor="middle"><tspan x="241.2" dy="8">IN_A_P  bajar</tspan></text><circle cx="312.12" cy="-165.6" r="4.32" style="stroke:#b91c1c;fill:white;stroke-width:1.6;stroke-dasharray:-;" /><circle cx="339.48" cy="-165.6" r="4.32" style="stroke:#b91c1c;fill:white;stroke-width:1.6;stroke-dasharray:-;" /><text x="325.79999999999995" y="-183.31999999999996" dominant-baseline="ideographic" fill="#b91c1c" font-size="8" font-family="sans" text-anchor="middle"><tspan x="325.79999999999995" dy="8">FC-INF (NC)</tspan></text><text x="360.0" y="-177.2" dominant-baseline="ideographic" fill="black" font-size="8" font-family="sans" text-anchor="middle"><tspan x="360.0" dy="8">10k</tspan></text><text x="388.8" y="-47.59999999999998" dominant-baseline="hanging" fill="#92400e" font-size="8" font-family="sans" text-anchor="middle"><tspan x="388.8" dy="8">EN  habilita</tspan></text><text x="846.0" y="-248.39999999999995" dominant-baseline="ideographic" fill="black" font-size="9" font-family="sans" text-anchor="middle"><tspan x="846.0" dy="9">M</tspan><tspan x="846.0" dy="9">volteo</tspan></text><text x="435.59999999999997" y="37.80000000000001" dominant-baseline="hanging" fill="#6b7280" font-size="9" font-family="sans" text-anchor="middle"><tspan x="435.59999999999997" dy="9">Finales de carrera NORMALMENTE CERRADOS (NC) en serie con IN1/IN2  +  pull-down 10k a GND.</tspan><tspan x="435.59999999999997" dy="9">En reposo el FC esta cerrado -&gt; la senal de control (conector Motor_A) llega al puente H. Al pisar el tope</tspan><tspan x="435.59999999999997" dy="9">(o si se corta el cable) el FC abre -&gt; el pull-down fuerza esa entrada a 0 -&gt; el puente H deja de empujar.</tspan><tspan x="435.59999999999997" dy="9">DIRECCIONAL: FC-SUP corta IN1 (subir) y FC-INF corta IN2 (bajar); la direccion opuesta sigue libre para revertir.</tspan><tspan x="435.59999999999997" dy="9">Es independiente del firmware: actua aunque el reed o el ESP32 fallen. EN_A (J9 pin4) no se corta.</tspan></text><text x="435.59999999999997" y="-388.32" dominant-baseline="ideographic" fill="#111827" font-size="15" font-family="sans" text-anchor="middle"><tspan x="435.59999999999997" dy="15">Final de carrera de seguridad — corte direccional de IN1/IN2</tspan></text><circle cx="360" cy="-288" r="2.7" style="stroke:black;fill:black;stroke-width:1.6;stroke-dasharray:-;" /><circle cx="360" cy="-165.6" r="2.7" style="stroke:black;fill:black;stroke-width:1.6;stroke-dasharray:-;" /></svg>